<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>QR & OCR Scanner</title>
    <link rel="stylesheet" href="style.css">
    <!-- Load Tesseract for OCR -->
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <!-- Load Supabase -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <div id="auth-header">
        <button id="auth-btn">Sign In</button>
        <span id="user-email"></span>
    </div>

    <div id="auth-modal" class="modal"></div>

    <div id="scanner-container">
        <div id="zoom-wrapper">
            <video id="video" autoplay playsinline></video>
            <canvas id="canvas"></canvas>
        </div>
    </div>
    
    <div id="ui-layer">
        <div id="result-box">
            <div id="qr-result">QR: Scanning...</div>
            <div id="ocr-result">OCR: Waiting for QR...</div>
        </div>
        <div class="controls">
            <label class="switch">
                <input type="checkbox" id="ocr-toggle">
                <span class="slider round"></span>
            </label>
            <span class="toggle-label">Identify card set (slower)</span>
        </div>
    </div>

    <script src="auth.js"></script>
    <script src="app.js"></script>
</body>
</html>
